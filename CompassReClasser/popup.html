.row {

    appearance: none;

    border: 2px solid #333;

    width: 40px;
    height: 24px;
    cursor: pointer;
    border-radius: 4px;
}

.header-container {

  gap: 10px;           /* Adds space between the text and the logo */
}

.header-container h3 {
  margin: 0;
}
