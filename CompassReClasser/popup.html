<!DOCTYPE html>
<html>
<head>
<style>
    
:root {
    color-scheme: dark;
}

body {
    font-family: Arial;
    padding: 10px;
    width: 260px;
}

.row {
    margin-bottom: 8px;
}

button {
    margin-top: 10px;
    width: 100%;
}


body {
    background-color: #121212; /* Dark background */
    color: white;
    font-family: sans-serif;
}

.row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px;
    border-bottom: 1px solid #333;
}

input[type="color"] {
    appearance: none;
    -webkit-appearance: none;
    border: 2px solid #333;
    background: none;
    width: 40px;
    height: 24px;
    cursor: pointer;
    border-radius: 4px;
}

.header-container {
  display: flex;
  align-items: center; /* Vertically centers the text and logo */
  gap: 20px;           /* Adds space between the text and the logo */
}

/* Based on switch by Yaya12085, found on Uiverse.io */ 
.container {
  transform: scale(0.5);
  transform-origin: top left;
  height: 30px;   /* 60 * 0.5 */
}

.label {
  height: 60px;
  width: 120px;
  background-color: #ffffff;
  border-radius: 30px;
  -webkit-box-shadow: inset 0 0 5px 4px rgba(255, 255, 255, 1),
    inset 0 0 20px 1px rgba(0, 0, 0, 0.488), 10px 20px 30px rgba(0, 0, 0, 0.096),
    inset 0 0 0 3px rgba(0, 0, 0, 0.3);
  box-shadow: inset 0 0 5px 4px rgba(255, 255, 255, 1),
    inset 0 0 20px 1px rgba(0, 0, 0, 0.488), 10px 20px 30px rgba(0, 0, 0, 0.096),
    inset 0 0 0 3px rgba(0, 0, 0, 0.3);
  display: flex;
  align-items: center;
  cursor: pointer;
  position: relative;
  transition: transform 0.4s;
}

.label:hover {
  transform: perspective(100px) rotateX(5deg) rotateY(-5deg);
}

#checkbox:checked ~ .label:hover {
  transform: perspective(100px) rotateX(-5deg) rotateY(5deg);
}

#checkbox {
  display: none;
}

#checkbox:checked ~ .label::before {
  left: 70px;
  background-color: #000000;
  background-image: linear-gradient(315deg, #000000 0%, #414141 70%);
  transition: 0.4s;
}

.label::before {
  position: absolute;
  content: "";
  height: 40px;
  width: 40px;
  border-radius: 50%;
  background-color: #000000;
  background-image: linear-gradient(
    130deg,
    #757272 10%,
    #ffffff 11%,
    #726f6f 62%
  );
  left: 10px;
  box-shadow: 0 2px 1px rgba(0, 0, 0, 0.3),
              10px 10px 10px rgba(0, 0, 0, 0.3);
  transition: 0.4s;
}

/* From Uiverse.io by barisdogansutcu */ 
button {
  padding: 17px 40px;
  border-radius: 50px;
  cursor: pointer;
  border: 0;
  background-color: white;
  box-shadow: rgb(0 0 0 / 5%) 0 0 8px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-size: 15px;
  transition: all 0.5s ease;
}

button:hover {
  letter-spacing: 3px;
  background-color: hsl(261deg 80% 48%);
  color: hsl(0, 0%, 100%);
  box-shadow: rgb(93 24 220) 0px 7px 29px 0px;
}

button:active {
  letter-spacing: 3px;
  background-color: hsl(261deg 80% 48%);
  color: hsl(0, 0%, 100%);
  box-shadow: rgb(93 24 220) 0px 0px 0px 0px;
  transform: translateY(10px);
  transition: 100ms;
}


</style>

</head>

</div>

<button id="randomize" style="background-color: #444; color: white;">Randomize Colors</button>
